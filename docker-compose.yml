x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:

  # ── Reverse proxy ─────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: echelon_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped
    logging: *default-logging
    networks:
      - echelon_net

  # ── Frontend build ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: echelon_frontend
    volumes:
      - frontend_dist:/app/dist
    networks:
      - echelon_net

  # ── FastAPI application ───────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: echelon_api
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://echelon:${POSTGRES_PASSWORD}@db:5432/echelon
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1G
    restart: unless-stopped
    logging: *default-logging
    networks:
      - echelon_net

  # ── Celery worker ─────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: echelon_worker
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://echelon:${POSTGRES_PASSWORD}@db:5432/echelon
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping --timeout 10 2>/dev/null | grep -q OK"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    stop_grace_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
    restart: unless-stopped
    logging: *default-logging
    networks:
      - echelon_net

  # ── Celery beat (scheduler) ───────────────────────────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: echelon_beat
    command: celery -A app.workers.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://echelon:${POSTGRES_PASSWORD}@db:5432/echelon
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping --timeout 10 2>/dev/null | grep -q OK"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    stop_grace_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    restart: unless-stopped
    logging: *default-logging
    networks:
      - echelon_net

  # ── Flower (Celery monitoring) ────────────────────────────────────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: echelon_flower
    command: celery -A app.workers.celery_app flower --port=5555 --url-prefix=flower --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD}
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://echelon:${POSTGRES_PASSWORD}@db:5432/echelon
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
    depends_on:
      - redis
      - worker
    # Flower is internal only — accessible via Nginx at /flower/ (protected)
    restart: unless-stopped
    logging: *default-logging
    networks:
      - echelon_net

  # ── Ollama (self-hosted LLM) ─────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: echelon_ollama
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/version || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - echelon_net

  # ── PostgreSQL + PostGIS ──────────────────────────────────────────────────
  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: echelon_db
    environment:
      - POSTGRES_USER=echelon
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=echelon
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U echelon -d echelon"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped
    logging: *default-logging
    networks:
      - echelon_net

  # ── Redis (broker + cache) ────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: echelon_redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $REDIS_PASSWORD ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped
    logging: *default-logging
    networks:
      - echelon_net

volumes:
  postgres_data:
  redis_data:
  frontend_dist:
  ollama_data:

networks:
  echelon_net:
    driver: bridge
