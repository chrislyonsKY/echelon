services:

  # ── Reverse proxy ─────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: echelon_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped
    networks:
      - echelon_net

  # ── Frontend build ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: echelon_frontend
    volumes:
      - frontend_dist:/app/dist
    networks:
      - echelon_net

  # ── FastAPI application ───────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: echelon_api
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://echelon:${POSTGRES_PASSWORD}@db:5432/echelon
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped
    networks:
      - echelon_net

  # ── Celery worker ─────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: echelon_worker
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://echelon:${POSTGRES_PASSWORD}@db:5432/echelon
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - echelon_net

  # ── Celery beat (scheduler) ───────────────────────────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: echelon_beat
    command: celery -A app.workers.celery_app beat --loglevel=info
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://echelon:${POSTGRES_PASSWORD}@db:5432/echelon
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - echelon_net

  # ── Flower (Celery monitoring) ────────────────────────────────────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: echelon_flower
    command: celery -A app.workers.celery_app flower --port=5555 --url-prefix=flower
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://echelon:${POSTGRES_PASSWORD}@db:5432/echelon
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      - redis
      - worker
    # Flower is internal only — accessible via Nginx at /flower/ (protected)
    restart: unless-stopped
    networks:
      - echelon_net

  # ── Ollama (self-hosted LLM) ─────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: echelon_ollama
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/version || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - echelon_net

  # ── PostgreSQL + PostGIS ──────────────────────────────────────────────────
  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: echelon_db
    environment:
      - POSTGRES_USER=echelon
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=echelon
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U echelon -d echelon"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - echelon_net

  # ── Redis (broker + cache) ────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: echelon_redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - echelon_net

volumes:
  postgres_data:
  redis_data:
  frontend_dist:
  ollama_data:

networks:
  echelon_net:
    driver: bridge
