name: Feature Request
description: Propose a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to improve Echelon? Describe the use case and your proposed solution below.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which area does this feature relate to?
      options:
        - Data sources / ingestion
        - Convergence scoring
        - Map visualization
        - Copilot / AI assistant
        - Alerts / AOI monitoring
        - Authentication / accounts
        - API
        - DevOps / deployment
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What problem does this solve? Who benefits?
      placeholder: |
        As a [type of user], I want to [do something] so that [benefit].
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: Describe how you think this should work.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider, and why did you rule them out?
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any mockups, references, links to related issues, or other context.
    validations:
      required: false
