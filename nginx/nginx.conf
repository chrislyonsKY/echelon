events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=api_copilot:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api_export:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api_cyber:10m rate=10r/m;
    limit_req_status 429;

    # SECURITY: Custom log format that redacts the X-Anthropic-Key / X-LLM-Key headers.
    # Default combined format would capture all request headers — BYOK keys must never be logged.
    log_format safe_combined '$remote_addr - $remote_user [$time_local] '
                             '"$request" $status $body_bytes_sent '
                             '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log safe_combined;

    upstream api {
        server api:8000;
    }

    upstream flower {
        server flower:5555;
    }

    server {
        listen 80;
        server_name _;

        # Limit request body size (defense against oversized payloads)
        client_max_body_size 2m;

        # ── Security headers ────────────────────────────────────────────────
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        # HSTS — enforces HTTPS for 1 year (Cloudflare terminates TLS upstream)
        add_header Strict-Transport-Security "max-age=7776000" always;
        # CSP: allow self + maplibre tiles; no unsafe-inline for scripts
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://*.basemaps.cartocdn.com; connect-src 'self' https://nominatim.openstreetmap.org; font-src 'self'; frame-ancestors 'none';" always;

        # Frontend static assets
        root /usr/share/nginx/html;
        index index.html;

        # API proxy — general endpoints
        location /api/ {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Copilot — strict rate limit (LLM calls are expensive)
        location /api/copilot/ {
            limit_req zone=api_copilot burst=3 nodelay;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Export — moderate rate limit (heavy queries)
        location /api/export/ {
            limit_req zone=api_export burst=5 nodelay;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Cyber-GEOINT — rate limit BYOK proxy endpoints (Shodan/Censys/WiGLE)
        location /api/cyber/ {
            limit_req zone=api_cyber burst=5 nodelay;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Flower monitoring — internal only, basic auth
        location /flower/ {
            auth_basic "Echelon Internal";
            auth_basic_user_file /etc/nginx/.htpasswd;
            proxy_pass http://flower/;
            proxy_set_header Host $host;
            rewrite ^/flower/(.*)$ /$1 break;
        }

        # SPA fallback — all non-asset routes serve index.html
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
