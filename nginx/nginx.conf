events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=api_copilot:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api_export:10m rate=10r/m;
    limit_req_status 429;

    upstream api {
        server api:8000;
    }

    upstream flower {
        server flower:5555;
    }

    server {
        listen 80;
        server_name _;

        # Frontend static assets
        root /usr/share/nginx/html;
        index index.html;

        # API proxy — general endpoints
        location /api/ {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Copilot — strict rate limit (LLM calls are expensive)
        location /api/copilot/ {
            limit_req zone=api_copilot burst=3 nodelay;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Export — moderate rate limit (heavy queries)
        location /api/export/ {
            limit_req zone=api_export burst=5 nodelay;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Flower monitoring — internal only, basic auth
        location /flower/ {
            auth_basic "Echelon Internal";
            auth_basic_user_file /etc/nginx/.htpasswd;
            proxy_pass http://flower/;
            proxy_set_header Host $host;
            rewrite ^/flower/(.*)$ /$1 break;
        }

        # SPA fallback — all non-asset routes serve index.html
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
